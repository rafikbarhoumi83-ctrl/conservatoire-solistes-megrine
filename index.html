<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS - Conservatoire Les Solistes</title>
  <!-- Suppression du fragment d'URL pour éviter l'erreur -->
  <script>
    if (window.location.hash && window.location.hash.includes('invite_token')) {
      // On nettoie l'URL en supprimant le fragment après 1 seconde
      setTimeout(function() {
        window.location.href = window.location.pathname;
      }, 100);
    }
  </script>
  <!-- Chargement du widget d'identité Netlify -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Attendre que le widget soit prêt
    window.netlifyIdentity = window.netlifyIdentity || {};
    window.netlifyIdentity.on = function(event, callback) {
      if (event === 'init') {
        document.addEventListener('DOMContentLoaded', callback);
      }
    };
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
